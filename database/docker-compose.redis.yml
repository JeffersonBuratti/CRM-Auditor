version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: auditoria-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./volumes/redis:/data
    networks:
      - auditoria-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  auditoria-network:
    external: true
